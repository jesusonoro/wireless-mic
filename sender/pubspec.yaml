name: wireless_mic_sender
description: Wireless microphone sender — streams audio over UDP.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  network_info_plus: ^5.0.3
  wakelock_plus: ^1.2.8
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-700.ttf
          weight: 700
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-500.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-600.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-700.ttf
          weight: 700
