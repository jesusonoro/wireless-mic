name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate launcher icons
        run: |
          for entry in "mdpi 48" "hdpi 72" "xhdpi 96" "xxhdpi 144" "xxxhdpi 192"; do
            density=$(echo $entry | cut -d' ' -f1)
            size=$(echo $entry | cut -d' ' -f2)
            dir="sender/android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert -size ${size}x${size} xc:"#1565C0" \
              -fill white -gravity center \
              -font DejaVu-Sans -pointsize $((size/3)) \
              -annotate 0 "MIC" \
              "${dir}/ic_launcher.png"
          done

      - name: Flutter pub get
        working-directory: sender
        run: flutter pub get

      - name: Build debug APK

        working-directory: sender
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wireless-mic-debug-apk
          path: sender/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

